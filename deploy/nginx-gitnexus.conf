# =============================================================================
# GitNexus — Nginx reverse proxy
# Domínio: nexus.oute.pro
# Serve: Web UI estática + API REST + MCP over HTTP
# =============================================================================

# Redireciona HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name nexus.oute.pro;

    # Necessário para renovação automática do certificado Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Servidor principal HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nexus.oute.pro;

    # Certificados gerados pelo certbot
    ssl_certificate     /etc/letsencrypt/live/nexus.oute.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexus.oute.pro/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Logs
    access_log /var/log/nginx/gitnexus.access.log;
    error_log  /var/log/nginx/gitnexus.error.log;

    # ==========================================================================
    # Web UI — arquivos estáticos do build Vite (React + Sigma.js)
    # ==========================================================================
    location / {
        root /opt/gitnexus/app/gitnexus-web/dist;
        try_files $uri $uri/ /index.html;

        # Headers obrigatórios para SharedArrayBuffer (LadybugDB WASM)
        # Sem estes headers o browser recusa SharedArrayBuffer e o LadybugDB falha
        add_header Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # ==========================================================================
    # API REST — proxy para o servidor Express (porta 4747 local)
    # Inclui: /api/repos, /api/query, /api/search, /api/graph, /api/file, etc.
    # ==========================================================================
    location /api/ {
        proxy_pass         http://127.0.0.1:4747;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # MCP sessions podem durar até 30min — timeout generoso
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        # Buffer desabilitado para streaming (MCP usa SSE/chunked)
        proxy_buffering off;
    }

    # ==========================================================================
    # MCP over HTTP — endpoint separado com Basic Auth
    # Protege acesso de agentes externos (Claude Code remoto, Cursor, etc.)
    # ==========================================================================
    location /api/mcp {
        # Basic Auth — criar credenciais com:
        #   sudo apt-get install -y apache2-utils
        #   sudo htpasswd -c /etc/nginx/.htpasswd-mcp agente1
        auth_basic           "GitNexus MCP Access";
        auth_basic_user_file /etc/nginx/.htpasswd-mcp;

        proxy_pass         http://127.0.0.1:4747;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Sessões MCP stateful — sem timeout agressivo
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_buffering off;
    }
}
